name: CI — Build & Test

on:
  push:
    branches: [ main, develop, feature/event-processor-impl, prod-ready-system ]
  pull_request:
    branches: [ main, develop, feature/event-processor-impl ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests -B -q

      - name: Run unit tests
        run: mvn test -B

      - name: Report test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: '**/target/surefire-reports/TEST-*.xml'
          reporter: java-junit

      - name: Publish coverage report
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: '**/target/site/jacoco/index.html'
          fail_ci_if_error: false
          verbose: true

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

      kafka:
        image: bitnami/kafka:3.6
        env:
          KAFKA_CFG_NODE_ID: 0
          KAFKA_CFG_PROCESS_ROLES: controller,broker
          KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
          KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
          KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@localhost:9093
          KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
          ALLOW_PLAINTEXT_LISTENER: "yes"
        options: >-
          --health-cmd "/opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 10
        ports:
          - 9092:9092

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Wait for Kafka
        run: timeout 120 bash -c 'until nc -z localhost 9092; do sleep 1; done'

      - name: Run integration tests
        run: mvn verify -B
        env:
          KAFKA_BROKERS: localhost:9092
          REDIS_HOST: localhost
          REDIS_PORT: 6379

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run checkstyle
        run: mvn checkstyle:check -q

      - name: Run spotbugs
        run: mvn spotbugs:check -q

      - name: SonarQube Scan
        continue-on-error: true
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=event-processor \
            -Dsonar.sources=sdk,producer-service,consumer-service \
            -Dsonar.java.binaries=target/classes \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
            -B -q

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push'

    outputs:
      producer-image: ${{ steps.docker-build.outputs.producer-image }}
      consumer-image: ${{ steps.docker-build.outputs.consumer-image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        id: docker-build
        continue-on-error: true
        run: |
          REPO="${{ secrets.DOCKER_REGISTRY }}/event-processor"
          TAG="${{ github.sha }}"

          docker build -f producer-service/Dockerfile -t $REPO/producer:$TAG producer-service/
          docker build -f consumer-service/Dockerfile -t $REPO/consumer:$TAG consumer-service/

          echo "producer-image=$REPO/producer:$TAG" >> $GITHUB_OUTPUT
          echo "consumer-image=$REPO/consumer:$TAG" >> $GITHUB_OUTPUT
